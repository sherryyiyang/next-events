version: "2"
type: frontend
tech_stack:
  - javascript
  - next.js 14 (app router)
  - tailwindcss
  - daisyui
  - next-auth v4
  - mongoose
  - react-hook-form
  - react-datepicker
  - uploadthing
  - react-hot-toast
routes:
  - path: /
    file: app/page.js
    auth_required: false
    description: Home page displaying all events with search functionality
  - path: /login
    file: app/login/page.js
    auth_required: false
    description: User login page with email and password credentials
  - path: /signup
    file: app/signup/page.js
    auth_required: false
    description: User registration page
  - path: /profile
    file: app/profile/page.js
    auth_required: true
    description: User profile page showing user info form and user's events
  - path: /events/create
    file: app/events/create/page.js
    auth_required: true
    description: Create a new event form
  - path: /events/[id]
    file: app/events/[id]/page.js
    auth_required: false
    description: Event detail page with related events
  - path: /events/[id]/update
    file: app/events/[id]/update/page.js
    auth_required: true
    description: Update an existing event (only by event organizer)
features:
  - name: User Sign Up
    description: Register a new account with name, email, and password. Auto-signs in after successful registration.
    files:
      - app/signup/page.js
      - components/SignUpForm.js
      - lib/actions/user.action.js
    entry_route: /signup
    user_interactions:
      - Fill name input field
      - Fill email input field
      - Fill password input field (min 6 characters)
      - Click Sign Up button to submit
      - See toast notification on success or error (duplicate email)
    api_calls:
      - method: POST
        endpoint: /api/auth/callback/credentials (auto sign-in after creation)
    auth_required: false
  - name: User Login
    description: Login with email and password credentials via NextAuth
    files:
      - app/login/page.js
      - components/LoginForm.js
      - app/api/auth/[...nextauth]/authConfig.js
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Log In button to submit
      - See toast success message and redirect to profile on success
      - See toast error message on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/callback/credentials
    auth_required: false
  - name: User Sign Out
    description: Sign out via navbar dropdown menu
    files:
      - components/Navbar.js
    entry_route: /
    user_interactions:
      - Click avatar in navbar to open dropdown
      - Click Sign Out option
    api_calls:
      - method: POST
        endpoint: /api/auth/signout
    auth_required: true
  - name: Browse Events
    description: View all events on the home page displayed as cards
    files:
      - app/page.js
      - components/EventCard.js
    entry_route: /
    user_interactions:
      - View event cards with title, category, date, description, and image
      - Click Learn More button to navigate to event detail page
    api_calls: []
    auth_required: false
  - name: Search Events
    description: Search events by title using debounced text input in navbar
    files:
      - components/Search.js
      - components/Navbar.js
      - app/page.js
    entry_route: /
    user_interactions:
      - Type search term in search input in navbar
      - Results update automatically after 1 second debounce
    api_calls: []
    auth_required: false
  - name: View Event Detail
    description: View full event details including organizer, dates, location, description, and related events
    files:
      - app/events/[id]/page.js
      - components/EventDetail.js
      - components/EventCard.js
    entry_route: /events/[id]
    user_interactions:
      - View event image, title, category, organizer name, dates, location, description
      - Click Visit Event Website button to open external URL
      - View related events by same category at the bottom
      - If organizer, see Edit and Delete buttons
    api_calls: []
    auth_required: false
  - name: Create Event
    description: Create a new event with title, category, location, URL, dates, description, and image upload
    files:
      - app/events/create/page.js
      - components/EventForm.js
      - components/ImageUploader.js
      - lib/actions/event.action.js
    entry_route: /events/create
    user_interactions:
      - Fill event title input
      - Select category from dropdown (Wellness, Social Club, Technology)
      - Fill location input
      - Fill URL input
      - Select start date and time via date picker
      - Select end date and time via date picker
      - Upload event image via drag-and-drop or file picker
      - Fill description textarea
      - Click Submit button
      - See toast success and redirect to event detail page
      - See validation errors if required fields are missing
    api_calls:
      - method: POST
        endpoint: /api/uploadthing (image upload)
    auth_required: true
  - name: Update Event
    description: Update an existing event (only available to the event organizer)
    files:
      - app/events/[id]/update/page.js
      - components/EventForm.js
      - lib/actions/event.action.js
    entry_route: /events/[id]/update
    user_interactions:
      - Edit pre-filled event form fields
      - Optionally upload a new image
      - Click Submit button
      - See toast success and redirect to updated event detail page
    api_calls:
      - method: POST
        endpoint: /api/uploadthing (image upload, if new image)
    auth_required: true
  - name: Delete Event
    description: Delete an event from event detail page or event card (organizer only)
    files:
      - components/EventDetail.js
      - components/EventCard.js
      - lib/actions/event.action.js
    entry_route: /events/[id]
    user_interactions:
      - Click Delete button on event detail page or event card
      - Confirm deletion in modal dialog (on event card)
      - Event is removed and page revalidates
    api_calls: []
    auth_required: true
  - name: Update Profile
    description: Update user name and profile picture on profile page
    files:
      - app/profile/page.js
      - components/UserForm.js
      - components/ImageUploader.js
      - lib/actions/user.action.js
    entry_route: /profile
    user_interactions:
      - Edit name input field
      - Upload new profile picture
      - Click Update button
      - See toast success notification
      - Navbar avatar updates to new picture
    api_calls:
      - method: POST
        endpoint: /api/uploadthing (image upload)
    auth_required: true
  - name: Navigation
    description: Navbar with logo, search, and auth-dependent menu items
    files:
      - components/Navbar.js
      - app/layout.js
    entry_route: /
    user_interactions:
      - Click Next-Events logo to go home
      - When unauthenticated, see Login and Sign Up links
      - When authenticated, see avatar dropdown with Profile, Create Event, and Sign Out
      - On mobile, click search icon to toggle search dropdown
    api_calls: []
    auth_required: false
known_limitations:
  - issue: SignUpForm references undefined router variable (missing useRouter import)
    location: components/SignUpForm.js
    impact: Redirect after sign up may fail at runtime
